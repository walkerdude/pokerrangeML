<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Classification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h1>Test Classification</h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Test Classification</h5>
                    </div>
                    <div class="card-body">
                        <button id="testBtn" class="btn btn-primary">Test Classification</button>
                        <div id="result" class="mt-3"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Response Data</h5>
                    </div>
                    <div class="card-body">
                        <pre id="responseData" class="bg-light p-3 rounded"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('testBtn').addEventListener('click', async function() {
            const resultDiv = document.getElementById('result');
            const responseDataDiv = document.getElementById('responseData');
            
            resultDiv.innerHTML = '<div class="text-center"><i class="fas fa-spinner fa-spin"></i> Testing...</div>';
            
            try {
                const testData = {
                    position: 6,
                    pot_size: 150,
                    stack_size: 1200,
                    num_players: 6,
                    actions: ["RAISE_MEDIUM", "BET_MEDIUM", "CHECK"]
                };
                
                console.log('Sending test data:', testData);
                
                const response = await fetch('/classify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });
                
                const data = await response.json();
                console.log('Received response:', data);
                
                // Display response data
                responseDataDiv.textContent = JSON.stringify(data, null, 2);
                
                if (data.error) {
                    resultDiv.innerHTML = `
                        <div class="alert alert-danger">
                            <strong>Error:</strong> ${data.error}
                        </div>
                    `;
                } else {
                    const prediction = data.prediction;
                    const predictionDetails = data.prediction_details;
                    const probabilities = predictionDetails ? predictionDetails.probabilities : null;
                    
                    resultDiv.innerHTML = `
                        <div class="alert alert-success">
                            <h6>Classification Result</h6>
                            <p><strong>Prediction:</strong> ${prediction}</p>
                            <p><strong>Confidence:</strong> ${predictionDetails ? (predictionDetails.confidence * 100).toFixed(1) : 'N/A'}%</p>
                        </div>
                    `;
                    
                    if (probabilities) {
                        resultDiv.innerHTML += `
                            <div class="mt-3">
                                <h6>Probabilities:</h6>
                                <ul>
                                    ${Object.entries(probabilities).map(([class_name, prob]) => 
                                        `<li><strong>${class_name}:</strong> ${(prob * 100).toFixed(1)}%</li>`
                                    ).join('')}
                                </ul>
                            </div>
                        `;
                    }
                }
                
            } catch (error) {
                console.error('Test error:', error);
                resultDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
